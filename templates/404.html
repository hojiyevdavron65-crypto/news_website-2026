<!DOCTYPE html>
<html lang="uz" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Sahifa topilmadi</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="h-full bg-slate-900 text-slate-100 flex items-center justify-center antialiased selection:bg-indigo-500 selection:text-white">

    <div class="absolute inset-0 overflow-hidden pointer-events-none opacity-30">
        <div class="absolute -top-[40%] -left-[20%] w-[70rem] h-[70rem] rounded-full bg-gradient-to-br from-indigo-600 to-purple-600 blur-[120px]"></div>
        <div class="absolute -bottom-[40%] -right-[20%] w-[70rem] h-[70rem] rounded-full bg-gradient-to-tr from-cyan-600 to-emerald-600 blur-[120px]"></div>
    </div>

    <div class="relative z-10 max-w-xl text-center px-6 py-12">

        <h1 class="text-9xl font-black tracking-widest bg-gradient-to-r from-indigo-400 via-purple-400 to-pink-400 bg-clip-text text-transparent drop-shadow-[0_5px_25px_rgba(99,102,241,0.3)] select-none animate-pulse">
            404
        </h1>

        <h2 class="mt-6 text-3xl font-extrabold tracking-tight sm:text-4xl text-white">
            Sahifa topilmadi!
        </h2>

        <p class="mt-4 text-base text-slate-400 leading-relaxed">
            Kechirasiz, siz qidirayotgan sahifa mavjud emas, o'chirilgan yoki manzili o'zgartirilgan bo'lishi mumkin. Keling, sizni to'g'ri yo'lga solib qo'yamiz.
        </p>

        <div class="mt-10 flex flex-col sm:flex-row gap-4 justify-center items-center">

            <a href="/" class="w-full sm:w-auto inline-flex items-center justify-center px-6 py-3 border border-transparent text-base font-medium rounded-xl text-white bg-indigo-600 hover:bg-indigo-500 shadow-lg shadow-indigo-600/30 transition-all duration-200 active:scale-98">
                <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path>
                </svg>
                Bosh sahifaga o'tish
            </a>

            <button onclick="history.back()" class="w-full sm:w-auto inline-flex items-center justify-center px-6 py-3 border border-slate-700 text-base font-medium rounded-xl text-slate-300 bg-slate-800/50 hover:bg-slate-800 hover:text-white hover:border-slate-600 transition-all duration-200 active:scale-98 backdrop-blur-sm">
                <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
                </svg>
                Orqaga qaytish
            </button>

        </div>

        <div class="mt-12 border-t border-slate-800 pt-6">
            <p class="text-sm text-slate-500">
                Muammo yuzaga keldimi? <a href="/support" class="font-medium text-indigo-400 hover:text-indigo-300 underline underline-offset-4">Qo'llab-quvvatlash xizmati</a> bilan bog'laning.
            </p>
        </div>

    </div>

</body>
</html>
